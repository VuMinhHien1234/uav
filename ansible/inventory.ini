; Multi-node (3 VM) inventory — hyper-converged cluster.
;
; All 3 hosts run the same role set (Ceph MON+OSD, Kafka broker+ZooKeeper,
; k3s server node, RGW+MLflow) so Ceph/Kafka/k3s each reach a real quorum
; of 3, instead of splitting into "1 VM per component" (which would leave
; every component with only 1 node — no quorum at all).
;
; The FIRST host listed below is the one that bootstraps Ceph and k3s; the
; other two join it. Order here is what decides that — not anything about
; the VM itself.
;
; (Single-VM setup: see git history for the old `[uav_vm]` 1-host inventory
; and matching playbook, if you don't want the 3-VM setup.)

[cluster_nodes]
uav-vm-1 ansible_host=34.142.203.64 ansible_user=minhhien ansible_ssh_private_key_file=~/.ssh/gcp_uav
uav-vm-2 ansible_host=34.87.43.159 ansible_user=minhhien ansible_ssh_private_key_file=~/.ssh/gcp_uav
uav-vm-3 ansible_host=34.21.193.224 ansible_user=minhhien ansible_ssh_private_key_file=~/.ssh/gcp_uav

[cluster_nodes:vars]
ansible_python_interpreter=/usr/bin/python3
